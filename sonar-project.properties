# Project key must match the one in pom.xml:
#   <sonar_projectKey>org.example:week1-swp2</sonar_projectKey>
sonar.projectKey=org.example:week1-swp2
sonar.projectName=Shopping Cart GUI
sonar.projectVersion=2.0-SNAPSHOT

# Source and binary paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# JaCoCo coverage report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

sonar.host.url=http://localhost:9000

# Token: set SONAR_TOKEN as a User environment variable instead of writing it here.
# Run with:
#   mvn clean verify sonar:sonar "-Dsonar.projectKey=org.example:week1-swp2" "-Dsonar.token=$env:SONAR_TOKEN" "-Dsonar.host.url=http://localhost:9000"
